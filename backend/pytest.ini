[tool:pytest]
filterwarnings =
    # Treat our own deprecation warnings as errors (during development)
    error::DeprecationWarning:app.*
    # Ignore third-party deprecation warnings we can't control
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::UserWarning:pydantic.*
testpaths = tests
python_files = test_*.py
